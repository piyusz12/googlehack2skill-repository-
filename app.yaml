runtime: python39

handlers:
  # Serve static CSS files
  - url: /css
    static_dir: css

  # Serve static JS files
  - url: /js
    static_dir: js

  # Serve all other static files that have an extension
  # This handles sw.js, manifest.json, images, etc.
  - url: /(.*\..+)$
    static_files: \1
    upload: (.*\..+)$

  # Catch-all handler to serve index.html for root and any SPA routes
  - url: /.*
    static_files: index.html
    upload: index.html
