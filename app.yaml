# VenueFlow — Google Cloud App Engine Configuration
# @see https://cloud.google.com/appengine/docs/standard/nodejs/config/appref

runtime: nodejs20

instance_class: F2

automatic_scaling:
  min_instances: 0
  max_instances: 10
  target_cpu_utilization: 0.65
  min_pending_latency: 30ms
  max_pending_latency: automatic

env_variables:
  NODE_ENV: "production"
  GOOGLE_CLOUD_PROJECT: "venueflow-t20"
  GOOGLE_CLOUD_REGION: "asia-south1"
  GOOGLE_API_KEY: "AIzaSyB_Xj6E3t-nPNv48RphhvW4BaUtjxWSXZo"

handlers:
  # Health check endpoint
  - url: /healthz
    script: auto

  # API endpoints (server-side)
  - url: /api/.*
    script: auto
    secure: always

  # Serve static CSS files
  - url: /css
    static_dir: css
    expiration: "1h"

  # Serve static JS files
  - url: /js
    static_dir: js
    expiration: "1h"

  # Serve all other static files that have an extension
  - url: /(.*\..+)$
    static_files: \1
    upload: (.*\..+)$
    expiration: "1h"

  # SPA catch-all: serve index.html for any unmatched routes
  - url: /.*
    script: auto
