# ============================================
# VenueFlow — Google Cloud Build CI/CD Pipeline
# ============================================
# Automated build and deploy to Cloud Run
# @see https://cloud.google.com/build/docs/configuring-builds/create-basic-configuration
# ============================================

steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci', '--only=production']

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow:${_COMMIT_SHA}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/venueflow:latest'
      - '.'

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/venueflow:${_COMMIT_SHA}'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'venueflow'
      - '--image=gcr.io/$PROJECT_ID/venueflow:${_COMMIT_SHA}'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'gcr.io/$PROJECT_ID/venueflow:${_COMMIT_SHA}'
  - 'gcr.io/$PROJECT_ID/venueflow:latest'

substitutions:
  _COMMIT_SHA: 'manual-build'

options:
  logging: CLOUD_LOGGING_ONLY
